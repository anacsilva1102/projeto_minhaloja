<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro - Maison Crochê</title>

    <link rel="stylesheet" href="../css/style_formulario.css">
    <script src="../js/consulta_cep.js" defer></script>

</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">

                 Maison Crochê

                

            </div>

            <nav id="menu">

                <ul>

                    <li>
                        <a href="../index.html">
                            <img src="../imagens/icones/inicio.png" alt="Início" title="Início">
                        </a>
                    </li>

                    <li>
                        <a href="sobre.html">
                            <img src="../imagens/icones/sobre.png" alt="Sobre" title="Sobre">
                        </a>
                    </li>

                    <li>
                        <a href="login.html">
                            <img src="../imagens/icones/login.png" alt="Login" title="Login">
                        </a>
                    </li>

                    <li>
                        <a href="cadastro.html">
                            <img src="../imagens/icones/cadastro.png" alt="Cadastro" title="Cadastro">
                        </a>
                    </li>

                    <li>
                        <a href="carrinho.html">
                            <img src="../imagens/icones/carrinho.png" alt="Carrinho" title="Carrinho">
                        </a>
                    </li>

                </ul>

            </nav>

        </header>

        <section id="pesquisa">

            <h3>Cadastro de Cliente</h3>

        </section>

        <section id="form">

            <form id="frm-pessoa">

                <label for="nome">Nome Completo</label>

                <input
                    class="input001"
                    type="text"
                    name="nome"
                    id="nome"
                    placeholder="Digite seu nome completo"
                    required>

                <label for="cpf">CPF</label>

                <input
                    class="input001"
                    type="text"
                    name="cpf"
                    id="cpf"
                    placeholder="000.000.000-00"
                    required>

                <label for="data">Data de Nascimento</label>

                <input
                    class="input001"
                    type="date"
                    name="data"
                    id="data"
                    required>

                <label for="telefone">Telefone</label>

                <input
                    class="input001"
                    type="tel"
                    name="telefone"
                    id="telefone"
                    placeholder="(79) 99999-9999"
                    required>

                <label for="cep">CEP</label>

                <input
                    class="input001"
                    type="text"
                    name="cep"
                    id="cep"
                    placeholder="49000-000">

                 <label for="email">E-mail</label>

                <input
                    class="input001"
                    type="email"
                    name="email"
                    id="email"
                    placeholder="email@exemplo.com"
                    required>

                <label for="endereco">Endereço</label>

                <input
                    class="input001"
                    type="text"
                    name="endereco"
                    id="endereco"
                    placeholder="Rua, Número"
                    required>

                <label for="bairro">Bairro</label>

                <input
                    class="input001"
                    type="text"
                    name="bairro"
                    id="bairro"
                    required>

                <label for="cidade">Cidade</label>

                <input
                    class="input001"
                    type="text"
                    name="cidade"
                    id="cidade"
                    required>

                <label for="estado">Estado</label>

             

             <select
    class="input001"
    name="estado"
    id="estado"
    required>

    <option value="">Selecione</option>
    <option value="AC">Acre</option>
    <option value="AL">Alagoas</option>
    <option value="AP">Amapá</option>
    <option value="AM">Amazonas</option>
    <option value="BA">Bahia</option>
    <option value="CE">Ceará</option>
    <option value="DF">Distrito Federal</option>
    <option value="ES">Espírito Santo</option>
    <option value="GO">Goiás</option>
    <option value="MA">Maranhão</option>
    <option value="MT">Mato Grosso</option>
    <option value="MS">Mato Grosso do Sul</option>
    <option value="MG">Minas Gerais</option>
    <option value="PA">Pará</option>
    <option value="PB">Paraíba</option>
    <option value="PR">Paraná</option>
    <option value="PE">Pernambuco</option>
    <option value="PI">Piauí</option>
    <option value="RJ">Rio de Janeiro</option>
    <option value="RN">Rio Grande do Norte</option>
    <option value="RS">Rio Grande do Sul</option>
    <option value="RO">Rondônia</option>
    <option value="RR">Roraima</option>
    <option value="SC">Santa Catarina</option>
    <option value="SP">São Paulo</option>
    <option value="SE">Sergipe</option>
    <option value="TO">Tocantins</option>

             </select>
                <label for="senha">Senha</label>

                <input
                    class="input001"
                    type="password"
                    name="senha"
                    id="senha"
                    required>

                <label for="confirmar">Confirmar Senha</label>

                <input
                    class="input001"
                    type="password"
                    name="confirmar"
                    id="confirmar"
                    required>

                <label>

                    <input
                        type="checkbox"
                        name="novidades"
                        id="novidades">

                    Desejo receber novidades e promoções da Heloisa Personalizados.

                </label>

                <input
                    type="submit"
                    value="Cadastrar"
                    class="btnCadastrar">

                <input
                    type="reset"
                    value="Limpar"
                    class="btnLimpar">

            </form>

        </section>

        <footer id="rodape">

            <h2>&copy; 2026 Maison Crochê</h2>

            <p>
                Formas de pagamento: Pix, Cartão de Débito e Crédito.
            </p>

        </footer>

    </main>


</body>

</html>
