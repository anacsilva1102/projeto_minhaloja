<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Maison Crochê</title>

    <link rel="stylesheet" href="../css/style_formulario.css">
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                Maison Crochê
            </div>

            <nav id="menu">

                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li>
                        <a href="carrinho.html">
                            <img src="../imagens/icones/carrinho.png" alt="Carrinho">
                        </a>
                    </li>
                </ul>

            </nav>

        </header>

       

        <section id="form">

            <h3>Cadastro de Pessoas</h3>

            <form id="frm-pessoa">

                <label for="nome">Nome</label>
                <input
                    type="text"
                    name="nome"
                    id="nome"
                    class="input001"
                    required
                    maxlength="60"
                    placeholder="Digite seu nome">

                <label for="cpf">CPF</label>
                <input
                    type="text"
                    name="cpf"
                    id="cpf"
                    class="input002"
                    required
                    maxlength="14"
                    placeholder="Digite seu CPF">

                <label for="telefone">Telefone</label>
                <input
                    type="text"
                    name="telefone"
                    id="telefone"
                    class="input002"
                    required
                    maxlength="15"
                    placeholder="Digite seu telefone">

                <label for="email">E-mail</label>
                <input
                    type="email"
                    name="email"
                    id="email"
                    class="input001"
                    required
                    maxlength="60"
                    placeholder="Digite seu e-mail">

                <label for="dataNascimento">Data de Nascimento</label>
                <input
                    type="date"
                    name="dataNascimento"
                    id="dataNascimento"
                    class="input002"
                    required>

                <label for="cep">CEP</label>
                <input
                    type="text"
                    name="cep"
                    id="cep"
                    class="input002"
                    required
                    maxlength="9"
                    placeholder="Digite seu CEP">

                <label for="logradouro">Logradouro</label>
                <input
                    type="text"
                    name="logradouro"
                    id="logradouro"
                    class="input001"
                    required
                    maxlength="100"
                    placeholder="Digite seu logradouro">

                <label for="numero">Número</label>
                <input
                    type="number"
                    name="numero"
                    id="numero"
                    class="input002"
                    required
                    placeholder="Digite o número">

                <label for="complemento">Complemento</label>
                <input
                    type="text"
                    name="complemento"
                    id="complemento"
                    class="input001"
                    maxlength="50"
                    placeholder="Digite o complemento">

                <label for="bairro">Bairro</label>
                <input
                    type="text"
                    name="bairro"
                    id="bairro"
                    class="input001"
                    required
                    maxlength="50"
                    placeholder="Digite o bairro">

                <label for="cidade">Cidade</label>
                <input
                    type="text"
                    name="cidade"
                    id="cidade"
                    class="input001"
                    required
                    maxlength="50"
                    placeholder="Digite a cidade">

                <label for="estado">Estado (UF)</label>
                <input
                    type="text"
                    name="estado"
                    id="estado"
                    class="input002"
                    required
                    maxlength="2"
                    placeholder="Ex: SE">

                <label for="senha">Senha</label>
                <input
                    type="password"
                    name="senha"
                    id="senha"
                    class="input002"
                    required
                    maxlength="20"
                    placeholder="Digite sua senha">

                <div id="check">

                    <input
                        type="checkbox"
                        name="novidades"
                        id="novidades">

                    <label for="novidades">
                        Desejo receber novidades por e-mail.
                    </label>

                </div>

                <div id="botoes">

                    <input
                        type="submit"
                        value="Cadastrar"
                        class="btnCadastrar">

                    <input
                        type="reset"
                        value="Limpar"
                        class="btnLimpar">

                </div>

            </form>

        </section>

        <footer id="rodape">

            <h2>&copy; Maison Crochê</h2>
            <h2>Exclusividade em cada ponto.</h2>
            <p>Formas de pagamento: Pix, Cartão de Débito e Crédito.</p>

        </footer>

    </main>

</body>

</html>
