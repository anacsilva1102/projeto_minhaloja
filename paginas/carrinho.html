<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho - Maison Crochê</title>

    <link rel="stylesheet" href="../css/style_estrutura_pagina.css">

</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">

                <h1>Maison Crochê</h1>
                
            </div>

            <nav id="menu">

                <ul>

                    <li>
                        <a href="../index.html">
                            <img src="../imagens/icones/inicio.png" alt="Início" title="Início">
                        </a>
                    </li>

                    <li>
                        <a href="sobre.html">
                            <img src="../imagens/icones/sobre.png" alt="Sobre" title="Sobre">
                        </a>
                    </li>

                    <li>
                        <a href="login.html">
                            <img src="../imagens/icones/login.png" alt="Login" title="Login">
                        </a>
                    </li>

                    <li>
                        <a href="cadastro.html">
                            <img src="../imagens/icones/cadastro.png" alt="Cadastro" title="Cadastro">
                        </a>
                    </li>

                    <li>
                        <a href="carrinho.html">
                            <img src="../imagens/icones/carrinho.png" alt="Carrinho" title="Carrinho">
                        </a>
                    </li>

                </ul>

            </nav>

        </header>

        <section id="pesquisa">

            <h3>Meu Carrinho</h3>

        </section>

        <section id="carrinho">

            <div id="listaProdutos">

                <table>

                    <thead>

                        <tr>

                            <th>Produto</th>
                            <th>Imagem</th>
                            <th>Quantidade</th>
                            <th>Preço</th>
                            <th>Subtotal</th>
                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

            <aside id="resumo">

                <h2>Resumo da Compra</h2>

                <div class="boxResumo">

                    <strong>CEP</strong>

                    <input
                        type="text"
                        id="cep"
                        maxlength="9"
                        placeholder="00000-000">

                </div>

                <div class="boxResumo">

                    <strong>Valor dos Produtos</strong>

                    <p id="valorProdutos">R$ 0,00</p>

                </div>

                <div class="boxResumo">

                    <strong>Frete</strong>

                    <p id="valorFrete">R$ 10,00</p>

                </div>

                <div class="boxResumo">

                    <strong>Total</strong>

                    <h3 id="valorTotal">R$ 0,00</h3>

                </div>

                <a href="../index.html" class="btnContinuar">

                    Continuar Comprando

                </a>

                <button class="btnFinalizar">

                    Finalizar Compra

                </button>

            </aside>

        </section>

        <footer id="rodape">

            <h2>&copy; Maison Crochê</h2>

            <p>
                Formas de pagamento: Pix, Cartão de Débito e Crédito.
            </p>

        </footer>

    </main>

    <script src="../js/tela_carrinho.js" type="module"></script>

</body>

</html>
