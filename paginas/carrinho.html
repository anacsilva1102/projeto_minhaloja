<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho - Maison Crochê</title>

    <link rel="stylesheet" href="../css/style_estrutura_pagina.css">
    <link rel="stylesheet" href="../css/style_carrinho.css">

</head>

<body>

<main id="geral">

    <header id="cabecalho">

        <div id="logo">
            <a href="../index.html">Maison Crochê</a>
        </div>

        <nav id="menu">

            <ul>

                <li>
                    <a href="../index.html">
                        Início
                    </a>
                </li>

                <li>
                    <a href="cadastro.html">
                        Cadastro
                    </a>
                </li>

                <li>
                    <a href="sobre.html">
                        Sobre
                    </a>
                </li>

                <li>
                    <a href="login.html">
                        Login
                    </a>
                </li>

                <li>
                    <a href="carrinho.html">
                        <img src="../imagens/icones/carrinho.png" alt="Carrinho">
                    </a>
                </li>

            </ul>

        </nav>

    </header>

    <section id="titulo">

        <h1>Carrinho de Compras</h1>

    </section>

    <section id="carrinho">

        <!-- Produtos -->
        <div id="itens-carrinho">

        </div>

        <!-- Resumo -->
        <aside id="resumo">

            <div class="caixa-resumo">

                <h3>CEP</h3>

                <input
                    type="text"
                    id="cep"
                    placeholder="Digite o CEP">

                <button id="btn-frete">
                    Calcular Frete
                </button>

            </div>

            <div class="caixa-resumo">

                <h3>Resumo do Pedido</h3>

                <div class="linha-resumo">

                    <span>Valor Total</span>

                    <strong id="valor-total">

                        R$ 0,00

                    </strong>

                </div>

                <div class="linha-resumo">

                    <span>Valor do Frete</span>

                    <strong id="valor-frete">

                        R$ 5,00

                    </strong>

                </div>

                <hr>

                <div class="linha-resumo total">

                    <span>Total a Pagar</span>

                    <strong id="valor-pagar">

                        R$ 5,00

                    </strong>

                </div>

            </div>

            <a
                href="../index.html"
                class="btn-continuar">

                Continuar Comprando

            </a>

            <button
                class="btn-finalizar"
                onclick="finalizarCompra()">

                Finalizar Compra

            </button>

        </aside>

    </section>

    <footer id="rodape">

        <h2>&copy; 2026 Maison Crochê</h2>

        <p>

            Formas de pagamento: Pix, Cartões de Débito e Crédito.

        </p>

    </footer>

</main>

<script src="../js/carrinho.js"></script>

</body>

</html>
