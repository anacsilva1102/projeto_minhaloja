<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maison Crochê</title>

    <link rel="stylesheet" href="../css/style_login.css">
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                Maison Crochê
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li>
                        <a href="carrinho.html">
                            <img src="../imagens/icones/carrinho.png" alt="Carrinho">
                        </a>
                    </li>
                </ul>
            </nav>

        </header>

        <section id="login">

            <h2>Login</h2>

            <form id="frm-login">

                <label for="email">E-mail</label>
                <input type="email" name="email" id="email"
                    class="input001" required
                    placeholder="Digite seu e-mail">

                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha"
                    class="input001" required
                    placeholder="Digite sua senha">

                <input type="submit" value="Entrar" class="btnEntrar">

            </form>

        </section>

        <footer id="rodape">
            <h2>&copy; Maison Crochê</h2>
            <h2>Exclusividade em cada ponto.</h2>
            <p>Formas de pagamento: Pix, Cartão de Débito e Crédito.</p>
        </footer>

    </main>

</body>

</html>
