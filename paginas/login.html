<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Maison Crochê</title>

    <link rel="stylesheet" href="../css/style_login.css">

</head>

<body>

<main id="geral">

    <header id="cabecalho">

        <div id="logo">

            Maison Crochê

        </div>

        <nav id="menu">

            <ul>

                <li>

                    <a href="../index.html">

                        <img src="../imagens/icones/inicio.png" alt="Início">

                    </a>

                </li>

                <li>

                    <a href="cadastro.html">

                        <img src="../imagens/icones/cadastro.png" alt="Cadastro">

                    </a>

                </li>

                <li>

                    <a href="sobre.html">

                        <img src="../imagens/icones/sobre.png" alt="Sobre">

                    </a>

                </li>

                <li>

                    <a href="login.html">

                        <img src="../imagens/icones/login.png" alt="Login">

                    </a>

                </li>

                <li>

                    <a href="carrinho.html">

                        <img src="../imagens/icones/carrinho.png" alt="Carrinho">

                    </a>

                </li>

            </ul>

        </nav>

    </header>

    <section id="login">

        <h2>Entrar</h2>

        <form id="frm-login">

            <label for="email">

                E-mail

            </label>

            <input
                type="email"
                id="email"
                class="input001"
                placeholder="Digite seu e-mail"
                required>

            <label for="senha">

                Senha

            </label>

            <input
                type="password"
                id="senha"
                class="input001"
                placeholder="Digite sua senha"
                required>

            <div id="botoes">

                <input
                    type="submit"
                    value="Entrar"
                    class="btnEntrar">

            </div>

            <p id="cadastre">

                Não possui uma conta?

                <a href="cadastro.html">

                    Cadastre-se

                </a>

            </p>

        </form>

    </section>

    <footer id="rodape">

        <h2>&copy; Maison Crochê</h2>

        <h2>Exclusividade em cada ponto.</h2>

        <p>

            Formas de pagamento: Pix, Cartão de Débito e Crédito.

        </p>

    </footer>

</main>

<script src="../js/login.js"></script>

</body>

</html>
