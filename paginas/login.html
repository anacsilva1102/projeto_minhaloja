<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Maison Crochê</title>

    <link rel="stylesheet" href="../css/style_formulario.css">

</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">

                <h1>Maison Crochê</h1>

            </div>

            <nav id="menu">

                <ul>

                    <li>
                        <a href="../index.html">
                            <img src="../imagens/icones/inicio.png" alt="Início" title="Início">
                        </a>
                    </li>

                    <li>
                        <a href="sobre.html">
                            <img src="../imagens/icones/sobre.png" alt="Sobre" title="Sobre">
                        </a>
                    </li>

                    <li>
                        <a href="login.html">
                            <img src="../imagens/icones/login.png" alt="Login" title="Login">
                        </a>
                    </li>

                    <li>
                        <a href="cadastro.html">
                            <img src="../imagens/icones/cadastro.png" alt="Cadastro" title="Cadastro">
                        </a>
                    </li>

                    <li>
                        <a href="carrinho.html">
                            <img src="../imagens/icones/carrinho.png" alt="Carrinho" title="Carrinho">
                        </a>
                    </li>

                </ul>

            </nav>

        </header>

        <section id="pesquisa">

            <h3>Login</h3>

        </section>

        <section id="form">

            <form id="frm-pessoa">

                <label for="email">E-mail</label>

                <input
                    class="input001"
                    type="email"
                    name="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                    required>

                <label for="senha">Senha</label>

                <input
                    class="input001"
                    type="password"
                    name="senha"
                    id="senha"
                    placeholder="Digite sua senha"
                    required>

                <label>

                    <input
                        type="checkbox"
                        name="lembrar"
                        id="lembrar">

                    Lembrar meu acesso

                </label>

                <input
                    type="submit"
                    value="Entrar"
                    class="btnCadastrar">

                <input
                    type="reset"
                    value="Limpar"
                    class="btnLimpar">

                <div class="cadastro-link">

                    <p>Não possui uma conta?</p>

                    <a href="cadastro.html">

                        Cadastre-se aqui

                    </a>

                </div>

            </form>

        </section>

        <footer id="rodape">

            <h2>&copy;Maison Crochê</h2>

            <p>
                Formas de pagamento: Pix, Cartão de Débito e Crédito.
            </p>

        </footer>

    </main>

    

</body>

</html>
